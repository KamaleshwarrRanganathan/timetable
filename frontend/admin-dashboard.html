<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar">
        <h2>Admin Panel</h2>
        <div class="nav-links">
            <a href="admin-dashboard.html">Dashboard</a>
            <a href="timetable.html">View Timetable</a>
            <a href="notifications.html" id="notifNav">Notifications</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="container">
        <h2>Welcome, <span id="userRoleTitle">Admin</span> <span id="adminName"></span></h2>
        <div class="dashboard-grid">
            <a href="add-teacher.html" class="card">
                <h3>Manage Users</h3>
                <p>Register new users (Teacher/HOD/Student)</p>
            </a>
            <a href="add-subject.html" class="card">
                <h3>Manage Subjects</h3>
                <p>Add subjects and courses</p>
            </a>
            <div class="card" id="generateTimetableCard" onclick="generateTimetable()" style="cursor: pointer; display: none;">
                <h3>Generate Timetable</h3>
                <p>Run automated scheduling algorithm</p>
            </div>
            <a href="manage-students.html" class="card" id="studentMgmtCard">
                <h3>Student Management</h3>
                <p>View OD requests and Absences</p>
            </a>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        const currRole = localStorage.getItem('userRole');
        document.getElementById('userRoleTitle').textContent = currRole === 'hod' ? 'HOD' : 'Admin';
        document.getElementById('adminName').textContent = localStorage.getItem('userName');
        
        if (currRole === 'hod') {
            document.getElementById('generateTimetableCard').style.display = 'block';
        }



        async function generateTimetable() {
            if (confirm('Are you sure you want to regenerate the entire timetable? This will overwrite current schedules.')) {
                try {
                    const res = await api.post('/timetable/generate', { role: currRole });
                    alert(res.message);
                } catch (err) {
                    alert('Error: ' + err.message);
                }
            }
        }
    </script>
</body>

</html>
